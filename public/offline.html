<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d9488" />
  <title>Offline — WorkHub</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #0f172a; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 420px; background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; padding: 32px; text-align: center; box-shadow: 0 8px 30px rgba(15,23,42,.06); }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { color: #64748b; font-size: .9rem; line-height: 1.5; margin: 0 0 20px; }
    a, button { display: inline-block; background: #0d9488; color: #fff; border: 0; border-radius: 12px; padding: 12px 18px; font-weight: 700; text-decoration: none; cursor: pointer; font-size: .85rem; }
    .muted { margin-top: 16px; font-size: .75rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:2.5rem;margin-bottom:12px" aria-hidden="true">📡</div>
    <h1>Bạn đang offline</h1>
    <p>WorkHub cần mạng để xem chỗ trống, đặt chỗ và thanh toán. Shell app đã được cache — thử lại khi có kết nối.</p>
    <button type="button" onclick="location.reload()">Thử lại</button>
    <p class="muted">Public pages có thể mở từ cache. API /host /admin luôn cần mạng.</p>
  </div>
</body>
</html>
