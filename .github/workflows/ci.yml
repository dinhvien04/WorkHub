name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Security UI (no inline handlers)
        run: npm run lint:security-ui

      - name: Format check (core)
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_at_least_32_characters_long_for_workhub
          ENABLE_TRANSACTIONS: 'false'

      - name: Build CSS + hashed assets
        run: npm run build

      - name: Verify CSS artifact
        run: test -s public/css/app.min.css

      - name: Audit production high+
        run: npm run audit:prod
        continue-on-error: true

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        continue-on-error: true

      - name: Start app smoke
        run: |
          export NODE_ENV=test
          export JWT_SECRET=test_jwt_secret_key_at_least_32_characters_long_for_workhub
          export MONGODB_URI=mongodb://127.0.0.1:27017/workhub_ci
          node server.js &
          echo $! > /tmp/workhub.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/health/ready; then break; fi
            sleep 1
          done
        continue-on-error: true

      - name: E2E Playwright
        run: PLAYWRIGHT_REQUIRE=1 BASE_URL=http://127.0.0.1:3000 npm run test:e2e
        continue-on-error: true
        env:
          CI: 'true'

      - name: Stop app
        if: always()
        run: kill $(cat /tmp/workhub.pid) 2>/dev/null || true
