name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - run: npm run lint:security-ui
      - run: npm run format:check
      - run: npm run lint
      - run: npm run audit:prod
      - run: npm run build
      - run: test -s public/css/app.min.css

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - name: Unit / integration (standalone Mongo — no multi-doc tx)
        run: npm run test:noforce
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_at_least_32_characters_long_for_workhub
          MONGODB_URI: mongodb://127.0.0.1:27017/workhub_ci_test
          ENABLE_TRANSACTIONS: 'false'
      - name: Upload jest logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-logs
          path: |
            **/coverage/**
            **/*junit*.xml
          if-no-files-found: ignore

  transactions-replica-set:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - name: Transaction suites (MongoMemoryReplSet)
        run: npm run test:transactions
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_at_least_32_characters_long_for_workhub
          ENABLE_TRANSACTIONS: 'true'
          USE_MONGO_REPLSET: '1'
      - name: Upload transaction failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: transaction-logs
          path: |
            **/coverage/**
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit, transactions-replica-set]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Start app + readiness
        run: |
          set -e
          export NODE_ENV=test
          export JWT_SECRET=test_jwt_secret_key_at_least_32_characters_long_for_workhub
          export MONGODB_URI=mongodb://127.0.0.1:27017/workhub_ci
          export ALLOW_MOCK_PAYMENT_PROVIDER=1
          export ALLOW_MOCK_COMPLETE=1
          export PAYMENT_PROVIDER=workhub_mock
          node server.js &
          echo $! > /tmp/workhub.pid
          ready=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3000/health/ready; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "Readiness probe failed"
            kill $(cat /tmp/workhub.pid) 2>/dev/null || true
            exit 1
          fi
      - name: E2E Playwright
        run: PLAYWRIGHT_REQUIRE=1 BASE_URL=http://127.0.0.1:3000 npm run test:e2e
        env:
          CI: 'true'
      - name: Stop app
        if: always()
        run: kill $(cat /tmp/workhub.pid) 2>/dev/null || true

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t workhub:ci .
      - name: Report Node version in image
        run: docker run --rm workhub:ci node -p "process.versions.node"

  # Final gate — fails the workflow if any required job failed
  final-gate:
    runs-on: ubuntu-latest
    needs: [static, unit, transactions-replica-set, e2e, docker]
    if: always()
    steps:
      - name: Require all jobs green
        run: |
          set -e
          echo "static=${{ needs.static.result }}"
          echo "unit=${{ needs.unit.result }}"
          echo "transactions=${{ needs.transactions-replica-set.result }}"
          echo "e2e=${{ needs.e2e.result }}"
          echo "docker=${{ needs.docker.result }}"
          test "${{ needs.static.result }}" = "success"
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.transactions-replica-set.result }}" = "success"
          test "${{ needs.e2e.result }}" = "success"
          test "${{ needs.docker.result }}" = "success"
          echo "Final gate GREEN for SHA ${{ github.sha }}"
