name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Security UI (no inline handlers)
        run: npm run lint:security-ui

      - name: Format check (core)
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:noforce
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_at_least_32_characters_long_for_workhub
          MONGODB_URI: mongodb://127.0.0.1:27017/workhub_ci_test
          ENABLE_TRANSACTIONS: 'false'

      - name: Build CSS + hashed assets
        run: npm run build

      - name: Verify CSS artifact
        run: test -s public/css/app.min.css

      - name: Audit production high+
        run: npm run audit:prod

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start app + readiness
        run: |
          set -e
          export NODE_ENV=test
          export JWT_SECRET=test_jwt_secret_key_at_least_32_characters_long_for_workhub
          export MONGODB_URI=mongodb://127.0.0.1:27017/workhub_ci
          export ALLOW_MOCK_PAYMENT_PROVIDER=1
          export ALLOW_MOCK_COMPLETE=1
          export PAYMENT_PROVIDER=workhub_mock
          node server.js &
          echo $! > /tmp/workhub.pid
          ready=0
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3000/health/ready; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" != "1" ]; then
            echo "Readiness probe failed"
            kill $(cat /tmp/workhub.pid) 2>/dev/null || true
            exit 1
          fi

      - name: E2E Playwright
        run: PLAYWRIGHT_REQUIRE=1 BASE_URL=http://127.0.0.1:3000 npm run test:e2e
        env:
          CI: 'true'

      - name: Stop app
        if: always()
        run: kill $(cat /tmp/workhub.pid) 2>/dev/null || true

      - name: Docker build
        run: docker build -t workhub:ci .
