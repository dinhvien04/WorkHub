name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_at_least_32_characters_long_for_workhub
          ENABLE_TRANSACTIONS: 'false'

      # Fail the job on high+ vulnerabilities (may require dependency upgrades)
      - name: Audit high+
        run: npm audit --audit-level=high
